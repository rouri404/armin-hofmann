<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physical Winding — Armin Hofmann</title>
  <meta name="description" content="Interactive tool inspired by the organic compositions of Armin Hofmann. Wrap a virtual string around pins to generate black organic shapes in the style of the Graphic Design Manual.">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header id="app-header">
    <div class="header-left">
      <img src="assets/logo.png" alt="Logo" style="height: 22px; object-fit: contain;">
      <h1>Physical Winding</h1>
      <span class="subtitle" style="margin-top: 2px;">tribute to Armin Hofmann</span>
    </div>
    <div class="header-actions">
      <button id="btn-undo" title="Undo (Ctrl+Z)">↩ Undo</button>
      <button id="btn-reset" title="Reset (Esc)">⟲ Reset</button>
      <button id="btn-export" title="Export PNG">⤓ Export</button>
    </div>
  </header>

  <aside id="sidebar">
    <div class="sidebar-section">
      <h3>Pin Grid</h3>
      <div class="input-group">
        <label for="input-rows">Rows</label>
        <input id="input-rows" type="number" min="2" max="10" value="4">
      </div>
      <div class="input-group">
        <label for="input-cols">Columns</label>
        <input id="input-cols" type="number" min="2" max="10" value="4">
      </div>
    </div>
    <div class="sidebar-section">
      <div id="status" class="status-idle">Ready</div>
      <div id="pin-counter">Wrapped pins: 0</div>
      <div id="area-display"></div>
    </div>
    <div class="sidebar-section sidebar-help">
      <p>Click and drag to wrap the string around the pins. Return to the starting point to close the shape.</p>
      <p style="margin-top:8px"><kbd>Ctrl+Z</kbd> Undo &nbsp; <kbd>Esc</kbd> Reset</p>
    </div>
  </aside>

  <main id="panels">
    <section class="panel" id="panel-op">
      <h2>Operation Area</h2>
      <div class="canvas-wrap" id="wrap-op">
        <canvas id="canvas-op" width="600" height="600"></canvas>
      </div>
    </section>
    <section class="panel" id="panel-res">
      <h2>Result</h2>
      <div class="canvas-wrap" id="wrap-res">
        <canvas id="canvas-res" width="600" height="600"></canvas>
      </div>
    </section>
  </main>

  <footer id="app-footer">
    <div class="footer-center">
      Created by Gabriel Couto
    </div>
    <div class="footer-right">
      <a href="https://github.com/rouri404/armin-hofmann" target="_blank" rel="noopener noreferrer" title="GitHub" aria-label="GitHub">
        <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" style="display: block;">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
        </svg>
      </a>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
